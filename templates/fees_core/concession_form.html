{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h3>Edit Concession</h3>
    {% for message in messages %}<p>{{ message }}</p>{% endfor %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
        <a href="{% url 'concession_list_core' %}?session={{ row.session_id }}">Back</a>
    </form>
</div>
{% endblock %}
