{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Purchase Report</h2>
    <form method="get" style="margin-bottom:10px;">
        <label>Session</label>
        <select name="session">
            <option value="">All Sessions</option>
            {% for session in sessions %}
                <option value="{{ session.id }}" {% if selected_session and selected_session.id == session.id %}selected{% endif %}>{{ session.name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Filter</button>
        <button type="submit" name="export" value="csv">Export Excel (CSV)</button>
        <button type="submit" name="export" value="pdf">Export PDF</button>
    </form>
    <table>
        <tr>
            <th>Date</th>
            <th>Invoice</th>
            <th>Session</th>
            <th>Vendor</th>
            <th>Amount</th>
        </tr>
        {% for row in rows %}
        <tr>
            <td>{{ row.purchase_date }}</td>
            <td>{{ row.invoice_number }}</td>
            <td>{{ row.session.name }}</td>
            <td>{{ row.vendor.vendor_name }}</td>
            <td>{{ row.total_amount }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="5">No rows found.</td></tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
